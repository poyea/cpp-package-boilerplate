name: docs

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-docs:
    if: false  # temporarily disabled
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install docs toolchain
        run: sudo apt-get update && sudo apt-get install -y cmake doxygen graphviz ninja-build
      - name: Configure docs
        run: cmake -S . -B build/docs -G Ninja -DCPP_PACKAGE_BOILERPLATE_BUILD_TESTS=OFF -DCPP_PACKAGE_BOILERPLATE_BUILD_BENCHMARKS=OFF -DCPP_PACKAGE_BOILERPLATE_BUILD_DOCS=ON
      - name: Build docs
        run: cmake --build build/docs --target docs
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/docs/docs/site/html

  deploy-docs:
    if: false  # temporarily disabled
    needs: build-docs
    runs-on: ubuntu-24.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

